# nginx.conf  Production Nginx config for TrustWork
# Place at: /etc/nginx/sites-available/trustwork
# Enable:   sudo ln -s /etc/nginx/sites-available/trustwork /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx

upstream trustwork_api {
    # PM2 cluster  2 Node instances on consecutive ports
    server 127.0.0.1:5000;
    keepalive 64;
}

# Redirect HTTP  HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL (Let's Encrypt  run: sudo certbot --nginx -d yourdomain.com)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Frontend  serve React build
    root /var/www/trustwork/frontend/dist;
    index index.html;

    # React Router  serve index.html for all non-API routes
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Static assets  long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy  Node.js
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://trustwork_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Rate limit at Nginx level too
        limit_req zone=api_limit burst=20 nodelay;
    }

    # Socket.io  WebSocket proxy
    location /socket.io/ {
        proxy_pass         http://trustwork_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    # Razorpay webhook  no rate limit
    location /payments/webhook {
        proxy_pass       http://trustwork_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block .env and hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Logs
    access_log /var/log/nginx/trustwork.access.log;
    error_log  /var/log/nginx/trustwork.error.log;
}

# Rate limit zone (define in nginx.conf http block, not here)
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
